<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Cluster Control Plane</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {darkMode: 'class'}
    </script>
    <style>
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }

        .terminal {
            background-color: #000;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.1);
        }
    </style>
</head>
<body class="transition-colors duration-500 bg-gray-50 dark:bg-slate-900 text-gray-900 dark:text-slate-100 min-h-screen">
<div id="root"></div>

<script type="text/babel">
    /* --- 从这里开始粘贴 --- */
    const {useState, useEffect, useRef} = React;

    // Get base path from current URL path, remove trailing slash if present
    // e.g., '/api/v1/admin/starter' or '/api/v1/admin/starter/'
    const BASE_PATH = window.location.pathname.replace(/\/$/, '');

    function App() {
        // --- 1. 主题控制 ---
        const [darkMode, setDarkMode] = useState(() => {
            const saved = localStorage.getItem('theme');
            return saved ? saved === 'dark' : true;
        });

        useEffect(() => {
            document.documentElement.classList.toggle('dark', darkMode);
            localStorage.setItem('theme', darkMode ? 'dark' : 'light');
        }, [darkMode]);

        // --- 2. 状态定义 ---
        const [status, setStatus] = useState({
            instances: [],
            myPid: 0,
            repoUrl: '', // 接收后端仓库地址
            isDeploying: false
        });
        const [branches, setBranches] = useState([]);
        const [selectedBranch, setSelectedBranch] = useState('');
        const [commits, setCommits] = useState([]);
        const [selectedCommit, setSelectedCommit] = useState('');

        const [logs, setLogs] = useState([]);
        const [showLogs, setShowLogs] = useState(false);
        const [localLoading, setLocalLoading] = useState(false);
        const [killingPid, setKillingPid] = useState(null);
        const logEndRef = useRef(null);

        useEffect(() => {
            logEndRef.current?.scrollIntoView({behavior: "smooth"});
        }, [logs]);

        // --- 3. 数据加载 ---
        const fetchStatus = async () => {
            try {
                const res = await fetch(`${BASE_PATH}/status`);
                const data = await res.json();
                if (data) setStatus(data);
            } catch (e) {
                console.error("Poll failed");
            }
        };

        const loadGitData = async () => {
            try {
                const bRes = await fetch(`${BASE_PATH}/git/branches`);
                const bData = await bRes.json();
                setBranches(bData || []);
                if (bData?.length > 0) {
                    const defaultBr = bData.includes('main') ? 'main' : bData[0];
                    setSelectedBranch(defaultBr);
                    fetchCommits(defaultBr);
                }
            } catch (e) {
                console.error("Branches fetch failed");
            }
        };

        const fetchCommits = async (br) => {
            try {
                const cRes = await fetch(`${BASE_PATH}/git/commits?branch=${br}`);
                const cData = await cRes.json();
                setCommits(cData || []);
                if (cData?.length > 0) setSelectedCommit(cData[0].hash);
            } catch (e) {
                console.error("Commits fetch failed");
            }
        };

        useEffect(() => {
            fetchStatus();
            loadGitData();
            const timer = setInterval(fetchStatus, 3000);
            return () => clearInterval(timer);
        }, []);

        // --- 4. 业务逻辑 (保持原有逻辑不动) ---
        const handleDeploy = async () => {
            if (!selectedCommit || status.isDeploying || localLoading) return;
            setLocalLoading(true);
            setLogs(["[SYSTEM] Initializing deployment pipeline..."]);
            setShowLogs(true);
            const es = new EventSource(`${BASE_PATH}/deploy/logs`);
            es.onmessage = (e) => {
                if (e.data.startsWith("EOF") || e.data.startsWith("ERR")) {
                    setLogs(prev => [...prev, e.data === "EOF" ? ">> DEPLOY SUCCESSFULLY" : ">> DEPLOY FAILED"]);
                    es.close();
                    setLocalLoading(false);
                    setTimeout(fetchStatus, 2000);
                    return;
                }
                setLogs(prev => [...prev, e.data]);
            };
            try {
                await fetch(`${BASE_PATH}/deploy?branch=${selectedBranch}&commit=${selectedCommit}`, {method: 'POST'});
            } catch (e) {
                setLogs(prev => [...prev, "!! Network Error"]);
                es.close();
                setLocalLoading(false);
            }
        };

        const handleKill = async (pid) => {
            if (killingPid) return;
            if (!confirm(`Terminate PID ${pid}?`)) return;
            setKillingPid(pid);
            try {
                const response = await fetch(`${BASE_PATH}/kill?pid=${pid}`, {method: 'POST'});
                if (pid === status.myPid) {
                    setTimeout(() => window.location.reload(), 3000);
                } else {
                    await fetchStatus();
                }
            } finally {
                setKillingPid(null);
            }
        };

        const isLocked = status.isDeploying || localLoading;

        return (
            <div className="max-w-6xl mx-auto p-4 md:p-12">
                <header
                    className="flex justify-between items-end mb-10 border-b border-gray-100 dark:border-slate-800 pb-6">
                    <div>
                        <div className="flex items-center gap-4">
                            {/* 返回首页按钮 */}
                            <a href="../" className="p-2 rounded-lg border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 hover:bg-gray-50 dark:hover:bg-slate-700 transition-all flex items-center gap-2 text-sm">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                                </svg>
                                <span>Home</span>
                            </a>
                            <h1 className="text-3xl font-black text-blue-600 italic tracking-tighter">Backend Deployment</h1>
                            {/* 仓库地址展示区 */}
                            <div
                                className="px-3 py-1 bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-md shadow-inner flex items-center gap-2">
                                <span
                                    className="w-2 h-2 bg-green-500 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]"></span>
                                <span
                                    className="mono text-[12px] text-slate-500 dark:text-slate-400 font-medium select-all">
                                    {status.repoUrl || 'git repo path loading...'}
                                </span>
                            </div>
                        </div>
                        <p className="mono text-[10px] opacity-40 uppercase tracking-[0.3em] mt-2 ml-1">Real-time
                            Deployment Console</p>
                    </div>
                    <button
                        type="button"
                        onClick={() => setDarkMode(!darkMode)}
                        className="p-2 w-10 h-10 rounded-full border border-gray-200 dark:border-slate-700 bg-white dark:bg-slate-800 flex items-center justify-center transition-all shadow-sm hover:scale-110"
                    >
                        {darkMode ? "☀️" : "🌙"}
                    </button>
                </header>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
                    {/* 左侧 Git 面板 */}
                    <div
                        className="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 p-6 rounded-2xl shadow-sm">
                        <label className="text-[10px] font-bold text-blue-500 uppercase mb-2 block tracking-wider">1.
                            Select Branch</label>
                        <select
                            className="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 p-2 rounded mb-6 mono text-xs outline-none focus:border-blue-500 transition-colors"
                            value={selectedBranch}
                            onChange={(e) => {
                                setSelectedBranch(e.target.value);
                                fetchCommits(e.target.value);
                            }}
                        >
                            {branches?.map(b => <option key={b} value={b}>{b}</option>)}
                        </select>

                        <label className="text-[10px] font-bold text-blue-500 uppercase mb-2 block tracking-wider">2.
                            Select Commit</label>
                        <div className="space-y-2 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar">
                            {commits?.map(c => (
                                <div
                                    key={c.hash}
                                    onClick={() => setSelectedCommit(c.hash)}
                                    className={`p-3 rounded-xl border cursor-pointer transition-all ${selectedCommit === c.hash ? 'border-blue-500 bg-blue-500/5 dark:bg-blue-600/10' : 'border-transparent bg-gray-50 dark:bg-slate-900/40 hover:border-gray-200 dark:hover:border-slate-600'}`}
                                >
                                    <div className="flex justify-between mono mb-1">
                                        <span className="text-blue-600 font-bold text-[14px]">{c.hash}</span>
                                        <span className="opacity-40 text-[12px]">{c.date}</span>
                                    </div>
                                    <div className="text-[12px] line-clamp-2 opacity-80 leading-snug">{c.msg}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 右侧 实例表格 */}
                    <div
                        className="lg:col-span-2 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-2xl overflow-hidden shadow-sm">
                        <div
                            className="p-4 border-b border-gray-100 dark:border-slate-700 flex justify-between items-center">
                            <span
                                className="text-xs font-bold uppercase opacity-50 tracking-wide">Active Instances</span>
                            <span
                                className="text-[10px] px-2 py-0.5 rounded bg-blue-500/10 text-blue-500 border border-blue-500/20 mono">Port: {status.port}</span>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full">
                                <thead
                                    className="bg-gray-50 dark:bg-slate-900/50 text-[10px] font-bold uppercase text-gray-400">
                                <tr>
                                    <th className="p-4 text-center">PID</th>
                                    <th className="p-4 text-center">Version</th>
                                    <th className="p-4 text-center">Deploy Time</th>
                                    <th className="p-4 text-center">Uptime</th>
                                    <th className="p-4 text-right">Actions</th>
                                </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100 dark:divide-slate-700/50">
                                {status.instances?.map(inst => (
                                    <tr key={inst.pid}
                                        className={`${inst.pid === status.myPid ? 'bg-blue-500/5' : ''} hover:bg-gray-50/50 dark:hover:bg-slate-700/20`}>
                                        <td className="p-4 text-center">
                                            <div className="flex items-center justify-center gap-3">
                                                <div
                                                    className={`w-2 h-2 rounded-full ${inst.pid === status.myPid ? 'bg-green-500 font-bold' : 'bg-gray-300'}`}></div>
                                                <span className="mono font-bold text-lg">{inst.pid}</span>
                                            </div>
                                        </td>
                                        <td className="p-4 text-center">
                                            <span
                                                className="mono text-[10px] text-blue-500 bg-blue-500/10 px-2 py-1 rounded border border-blue-500/20 shadow-sm">{inst.version}</span>
                                        </td>
                                        <td className="p-4 text-center">
                                            <div
                                                className="inline-block px-3 py-1 rounded-full bg-slate-100 dark:bg-slate-700/50 border border-slate-200 dark:border-slate-600/50">
                                                <span
                                                    className="mono text-[11px] text-slate-600 dark:text-slate-300 font-medium italic">{inst.deployedAt}</span>
                                            </div>
                                        </td>
                                        <td className="p-4 text-center mono text-xs text-blue-500 font-bold">{inst.uptime}</td>
                                        <td className="p-4 text-right">
                                            <button
                                                type="button"
                                                disabled={status.instances?.length <= 1 || !!killingPid}
                                                onClick={() => handleKill(inst.pid)}
                                                className={`px-4 py-1.5 rounded-lg text-[10px] font-bold uppercase transition-all
                                                    ${(status.instances?.length <= 1 || !!killingPid)
                                                    ? 'text-gray-400 cursor-not-allowed opacity-30 bg-gray-100 dark:bg-slate-800'
                                                    : 'text-red-500 border border-red-500/20 hover:bg-red-500 hover:text-white hover:shadow-lg'}`}
                                            >
                                                {killingPid === inst.pid ? "..." : (status.instances?.length <= 1 ? "Protected" : "Kill")}
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                {showLogs && (
                    <div className="mb-6 rounded-2xl overflow-hidden border border-slate-700 bg-black shadow-2xl">
                        <div
                            className="bg-slate-800 px-4 py-2 flex justify-between items-center border-b border-slate-700">
                            <span className="mono text-[10px] text-slate-400">Terminal Output</span>
                            <button type="button" onClick={() => setShowLogs(false)}
                                    className="text-slate-500 hover:text-white text-xs">Close
                            </button>
                        </div>
                        <div
                            className="p-4 h-48 overflow-y-auto mono text-[11px] text-green-400 terminal custom-scrollbar whitespace-pre-wrap">
                            {logs?.map((l, i) => <div key={i} className="mb-1">{l}</div>)}
                            <div ref={logEndRef}/>
                        </div>
                    </div>
                )}

                <button
                    type="button"
                    onClick={handleDeploy}
                    disabled={isLocked || !selectedCommit}
                    className={`w-full py-5 rounded-2xl font-bold uppercase tracking-[0.2em] text-sm transition-all flex items-center justify-center gap-3 shadow-xl
                        ${isLocked || !selectedCommit ? 'bg-gray-300 dark:bg-slate-800 text-gray-500' : 'bg-blue-600 hover:bg-blue-500 text-white active:scale-[0.98]'}`}
                >
                    {isLocked ? <div
                            className="animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div> :
                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2"
                                  d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>}
                    <span>{isLocked ? "Executing Pipeline..." : `Deploy Commit ${selectedCommit.substring(0, 7)}`}</span>
                </button>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
    /* --- 粘贴到此结束 --- */
</script>
</body>
</html>
